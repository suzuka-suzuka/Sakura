# 钓点宝箱掉落配置
# 每个钓点的宝藏稀有度渔获固定为该钓点专属宝箱（见 fish.json 中 chest_* 条目），
# 钓上后进背包，发送「#开宝箱」按下方权重表随机开出一项奖励。
#
# 条目字段说明：
#   weight  权重（同一宝箱内相对值，建议合计 100 方便读作百分比）
#   type    奖励类型：
#     coins        樱花币。min/max 为金额区间；带 name/description 时展示为“开出珍宝并自动变卖”
#     item         背包物品。item_id 对应 shop.yaml / special_items.yaml 的物品 id，count 为数量
#     random_bait  随机一种鱼饵 ×count（等概率，含寻宝鱼饵）
#     random_line  随机一种尚未拥有的鱼线；全部拥有时，其权重自动并入普通樱花币
#     curse        开箱事故：噩梦诅咒 +layers 层，同时给 coins 慰问金
# 每张表总权重为 100，其中首领鱼饵固定占 5；random_bait 会排除首领鱼饵。
#
# 期望值设计（不含首领鱼饵折算）：
#   pond ~160 → river ~250 → lake ~460(高方差) → coast ~750 → abyss ~690(带诅咒风险)
#   → mystic ~1100，与该钓点对应档位的鱼饵成本保持 2.5~3 倍关系

