categories:
  special:
    name: "🎁 特殊物品"
    description: "钓鱼宝箱中获得的特殊道具"
    handler: fishing_special
    items:
      # ===== 通用道具 =====
      - id: item_charm_lucky
        name: 好运护符
        icon: 🍀
        type: buff
        duration: 2100
        description: 使用后35分钟内，钓鱼必定上钩。
        activation_message: "🍀 好运护符已激活！\n🎣 接下来35分钟内，钓鱼必定上钩！"

      - id: item_toolkit_repair
        name: 修理工具箱
        icon: 🔧
        type: consumable
        instant_effect: repair_rod
        description: 完全修复当前鱼竿的耐久损耗，以及骸骨鲨留下的暗伤。

      - id: item_holy_water
        name: 净化圣水
        icon: 💧
        type: consumable
        instant_effect: clear_debuffs
        description: 清除骷髅诅咒、花嫁印记、亡者高利贷（含抽成印记）与深压诅咒等负面状态。

      - id: item_sand_time
        name: 时之沙
        icon: ⏳
        type: buff
        duration: 2100
        description: 使用后35分钟内，钓鱼冷却减半。
        activation_message: "⏳ 时之沙开始流动！\n🎣 接下来35分钟内，钓鱼冷却减半！"

      # 首领鱼饵沿用 shop.yaml 中的 bait_boss，由所有钓点宝箱共同掉落。

      # ===== 钓点专属道具（均持续35分钟） =====
      - id: item_sign_koi
        name: 锦鲤许愿签
        icon: 🎏
        type: consumable
        duration: 2100
        instant_effect: koi_wish
        description: 樱花池塘专属道具。使用后35分钟内，下一次咬钩必定异色。

      - id: item_charm_river
        name: 河神垂青
        icon: 🌊
        type: buff
        duration: 2100
        description: 青柳河湾专属道具。使用后35分钟内，任何原因都不会让鱼线断裂；每次成功保住鱼线，还会按当前鱼线的市价折算等额樱花币补偿给你。
        activation_message: "🌊 河神垂青！\n🧵 接下来35分钟内你的鱼线坚不可摧，每次挡下断裂都会把鱼线价值折算成樱花币补偿给你！"

      - id: item_lamp_fog
        name: 雾灯
        icon: 🌫️
        type: buff
        duration: 2100
        description: 雾隐湖专属道具。使用后35分钟内个人天气固定为雾，且不会钓到垃圾或噩梦。
        activation_message: "🌫️ 雾灯亮起！\n🎣 接下来35分钟内个人天气固定为雾，不会钓到垃圾或噩梦！"

      - id: item_card_double_coin
        name: 双倍金币卡
        icon: 💰
        type: buff
        duration: 2100
        description: 落日海岸专属道具。使用后35分钟内钓鱼金币收益翻倍。
        activation_message: "💰 双倍金币卡已激活！\n✨ 接下来35分钟内钓鱼金币收益 ×2！"

      - id: item_bait_monster
        name: 怪物诱饵
        icon: 🩸
        type: buff
        duration: 2100
        description: 深渊海沟专属道具。使用后35分钟内更容易遭遇噩梦，钓鱼金币与经验均变为3倍。
        activation_message: "🩸 怪物诱饵撒入水中！\n💀 接下来35分钟内更容易遭遇噩梦，钓鱼金币与经验 ×3！"

      - id: item_bottle_wish
        name: 星愿瓶
        icon: 🌠
        type: consumable
        duration: 2100
        instant_effect: star_wish
        description: 星辉秘境专属道具。使用时指定品质，35分钟内下一次咬钩必定为该品质。

  treasures:
    name: "💎 钓点藏品"
    description: "各钓点宝箱的专属藏品"
    handler: fishing_special
    items:
      - id: treasure_pond_sakura_amber
        name: 百年樱珀
        icon: 🟠
        type: treasure
        sell_price: 666
        description: 樱花池塘沉积百年形成的花瓣琥珀。

      - id: treasure_river_golden_scale
        name: 河神金鳞
        icon: 🟡
        type: treasure
        sell_price: 666
        description: 青柳河湾逆流而来的金色鳞片。

      - id: treasure_lake_bronze_mirror
        name: 雾湖古镜
        icon: 🪞
        type: treasure
        sell_price: 666
        description: 从雾隐湖底捞出的古老铜镜。

      - id: treasure_coast_black_pearl
        name: 暮潮黑珍珠
        icon: ⚫
        type: treasure
        sell_price: 666
        description: 落日海岸暮潮孕育的黑珍珠。

      - id: treasure_abyss_dragon_ambergris
        name: 深海龙涎香
        icon: 🐋
        type: treasure
        sell_price: 666
        description: 深渊巨兽遗留的奇香结晶。

      - id: treasure_mystic_star_fragment
        name: 星河碎片
        icon: ✨
        type: treasure
        sell_price: 666
        description: 星辉秘境中凝固的一小片星河。

  chests:
    name: "🗝️ 钓点宝箱"
    description: "各钓点专属的宝箱，发送「#开宝箱」开启"
    handler: fishing_chest
    items:
      - id: chest_pond
        name: 花瓣木箱
        type: chest
        description: 樱花池塘专属宝箱，可开出通用道具、锦鲤许愿签与百年樱珀。

      - id: chest_river
        name: 柳木匣
        type: chest
        description: 青柳河湾专属宝箱，可开出通用道具、河神垂青与河神金鳞。

      - id: chest_lake
        name: 沉雾古匣
        type: chest
        description: 雾隐湖专属宝箱，可开出通用道具、雾灯与雾湖古镜。

      - id: chest_coast
        name: 舶来宝箱
        type: chest
        description: 落日海岸专属宝箱，可开出通用道具、双倍金币卡与暮潮黑珍珠。

      - id: chest_abyss
        name: 渊铁囚箱
        type: chest
        description: 深渊海沟专属宝箱，可开出通用道具、怪物诱饵与深海龙涎香。

      - id: chest_mystic
        name: 星屑圣匣
        type: chest
        description: 星辉秘境专属宝箱，可开出通用道具、星愿瓶与星河碎片。
