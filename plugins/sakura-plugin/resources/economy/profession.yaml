# 钓鱼职业配置
# 解锁条件: 钓鱼等级 >= 8 可选择1级职业
# 进阶条件: 钓鱼等级 >= 14 可进阶到2级
# 注意: 每人只能选择一个职业，选择后不可更换

unlock_requirements:
  choose_fishing_level: 8     # 选择1级职业所需钓鱼等级
  advance_fishing_level: 14   # 进阶2级职业所需钓鱼等级

professions:
  treasure_hunter:
    name: "宝藏猎人"
    icon: "💎"
    description: "提升钓到宝藏的概率"
    effect_type: "treasure_bonus"  # 效果类型
    levels:
      1:
        title: "寻宝新手"
        treasure_bonus: 2
        description: "宝藏概率权重+2"
      2:
        title: "寻宝大师"
        treasure_bonus: 4
        description: "宝藏概率权重+4"

  fishing_master:
    name: "钓鱼大师"
    icon: "🎣"
    description: "鱼竿熟练度可为鱼线提供承重加成"
    effect_type: "line_bonus"  # 效果类型
    levels:
      1:
        title: "老练钓手"
        mastery_multiplier: 0.5
        description: "鱼线承重+0.5×熟练度"
      2:
        title: "垂钓宗师"
        mastery_multiplier: 0.9
        description: "鱼线承重+0.9×熟练度"

  merchant:
    name: "精明商人"
    icon: "💰"
    description: "增加钓鱼金币收益"
    effect_type: "coin_bonus"  # 效果类型
    levels:
      1:
        title: "小贩"
        coin_bonus: 0.08
        description: "金币收益+8%"
      2:
        title: "富商巨贾"
        coin_bonus: 0.15
        description: "金币收益+15%"

  abyss_hunter:
    name: "深渊猎手"
    icon: "🗡️"
    description: "减轻噩梦惩罚，并从噩梦渔获中获得更多经验"
    effect_type: "nightmare_specialist"
    levels:
      1:
        title: "猎魔新人"
        nightmare_exp_bonus: 0.20
        nightmare_penalty_reduction: 0.20
        nightmare_line_save_chance: 0.20
        description: "噩梦经验+20%，噩梦惩罚降低20%，20%概率保住鱼线"
      2:
        title: "深渊克星"
        nightmare_exp_bonus: 0.40
        nightmare_penalty_reduction: 0.40
        nightmare_line_save_chance: 0.40
        description: "噩梦经验+40%，噩梦惩罚降低40%，40%概率保住鱼线"
