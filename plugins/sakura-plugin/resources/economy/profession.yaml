# 钓鱼职业配置
# 解锁条件: 钓鱼等级 >= 8 可选择1级职业
# 进阶条件: 钓鱼等级 >= 12 可进阶到2级
# 注意: 每人只能选择一个职业，选择后不可更换

unlock_requirements:
  choose_fishing_level: 8     # 选择1级职业所需钓鱼等级
  advance_fishing_level: 12   # 进阶2级职业所需钓鱼等级

professions:
  treasure_hunter:
    name: "宝藏猎人"
    icon: "💎"
    description: "提升钓到宝藏的概率"
    effect_type: "treasure_bonus"  # 效果类型
    levels:
      1:
        title: "寻宝新手"
        treasure_bonus: 4
        description: "宝藏概率权重+4"
      2:
        title: "寻宝大师"
        treasure_bonus: 8
        description: "宝藏概率权重+8"

  fishing_master:
    name: "钓鱼大师"
    icon: "🎣"
    description: "鱼竿熟练度可为鱼线提供承重加成"
    effect_type: "line_bonus"  # 效果类型
    levels:
      1:
        title: "老练钓手"
        mastery_multiplier: 0.4
        description: "鱼线承重+0.4×熟练度"
      2:
        title: "垂钓宗师"
        mastery_multiplier: 0.8
        description: "鱼线承重+0.8×熟练度"

  merchant:
    name: "精明商人"
    icon: "💰"
    description: "增加钓鱼金币收益"
    effect_type: "coin_bonus"  # 效果类型
    levels:
      1:
        title: "小贩"
        coin_bonus: 0.20
        description: "金币收益+20%"
      2:
        title: "富商巨贾"
        coin_bonus: 0.35
        description: "金币收益+35%"

  abyss_hunter:
    name: "深渊猎手"
    icon: "🗡️"
    description: "减轻噩梦惩罚，并从噩梦渔获中获得更多经验"
    effect_type: "nightmare_specialist"
    levels:
      1:
        title: "猎魔新人"
        nightmare_exp_bonus: 0.30
        nightmare_penalty_reduction: 0.30
        nightmare_line_save_chance: 0.30
        description: "噩梦经验+30%，噩梦惩罚降低30%，30%概率保住鱼线"
      2:
        title: "深渊克星"
        nightmare_exp_bonus: 0.60
        nightmare_penalty_reduction: 0.60
        nightmare_line_save_chance: 0.60
        description: "噩梦经验+60%，噩梦惩罚降低60%，60%概率保住鱼线"
